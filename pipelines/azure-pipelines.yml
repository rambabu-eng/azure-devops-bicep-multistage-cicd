trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
- group: vg-devops-bicep

stages:
- stage: Validate
  displayName: 'Validate Bicep'
  jobs:
  - job: Validate
    steps:
    - template: templates/validate.yml

- stage: Deploy_Dev
  displayName: 'Deploy to Dev'
  dependsOn: Validate
  condition: succeeded()
  jobs:
  - job: DeployDev
    steps:
    - template: templates/deploy.yml
      parameters:
        resourceGroup: $(devResourceGroup)
        parameterFile: infra/parameters/dev.parameters.json

- stage: Deploy_Prod
  displayName: 'Deploy to Prod'
  dependsOn: Deploy_Dev
  jobs:
  - deployment: DeployProd
    environment: 'prod'
    strategy:
      runOnce:
        deploy:
          steps:
          - template: templates/deploy.yml
            parameters:
              resourceGroup: $(prodResourceGroup)
              parameterFile: infra/parameters/prod.parameters.json